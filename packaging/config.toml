[daemon]
# NOTA: em produção, socket_path e db_path são GERIDOS PELO systemd unit
# (rustployd.service), que os fixa via Environment=RUSTPLOY_SOCKET_PATH e
# RUSTPLOY_DB_PATH apontando para /run/rustploy e /var/lib/rustploy (diretórios
# criados por RuntimeDirectory=/StateDirectory=). Como env vars têm prioridade
# sobre este arquivo, editar os dois campos abaixo NÃO terá efeito sob systemd —
# ajuste no unit ou em /etc/rustploy/environment (lido via EnvironmentFile=).
socket_path  = "/run/rustploy/rustploy.sock"
db_path      = "/var/lib/rustploy/db"
log_level    = "info"
# webhook_port (callback OAuth + webhooks CI/CD) e as demais seções abaixo VÊM
# deste arquivo normalmente — não são sobrescritos pelo unit.
# 8788 evita 9000/9001, comuns em MinIO/rustfs (S3).
webhook_port = 8788

[ingress]
http_port    = 80
https_port   = 443
bind_address = "0.0.0.0"

[ingress.acme]
enabled   = false
email     = ""               # set your email to enable ACME/TLS
directory = "https://acme-v02.api.letsencrypt.org/directory"

[docker]
socket_path = "/var/run/docker.sock"

[deploy]
drain_secs  = 10
image_cache = 2

[metrics]
interval_secs  = 2
history_points = 60

[secrets]
master_key_path = "/etc/rustploy/master.key"

# Faixa de portas de host que o rustploy aloca automaticamente para exposição
# externa de serviços TCP (bancos, brokers…) — o "host_port" automático.
# Também é a ÚNICA faixa que o helper privilegiado de firewall (rustployd-fw)
# aceita liberar/bloquear no ufw; portas fora dela são recusadas.
[external_ports]
range_start = 20000
range_end   = 20999

# Registry Docker OCI (Distribution API v2) embutido no daemon — Fase 1:
# escuta apenas em loopback (127.0.0.1), sem autenticação. Habilite e use
# docker push 127.0.0.1:5100/<repo>:<tag>.
[registry]
enabled = false
port    = 5100
# storage_dir = "/var/lib/rustploy/db/registry"   # default: <db_path>/registry/
