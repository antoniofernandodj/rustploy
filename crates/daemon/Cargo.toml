[package]
name = "daemon"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
hyper-util = { version = "0.1", features = ["server-auto", "tokio"] }
tower = "0.4"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
shared = { path = "../shared" }
async-trait = "0.1"
bytes = "1.0"
